// ── Отрисовка маркеров ───────────────────────────────────────────────
const markers = [];
incidents.forEach(d => {
  const m = L.marker([d.lat, d.lng], { icon: icon(d.deaths, d.year) });
  m.bindPopup(popup(d), { maxWidth: 300 });
  m.options.year = d.year;
  m.options.deaths = d.deaths >= 3 ? 3 : d.deaths;
  m.addTo(map);
  markers.push(m);
});

// ── Счётчик ──────────────────────────────────────────────────────────
function updateCounter() {
  const shown = markers.filter(m => map.hasLayer(m));
  document.getElementById('shown').textContent = shown.length;
  document.getElementById('total').textContent = markers.length;
  document.getElementById('deaths_shown').textContent = shown.reduce((s, m) => {
    const d = incidents.find(i => i.lat === m.getLatLng().lat);
    return s + (d ? d.deaths : 0);
  }, 0);
}
updateCounter();

// ── Фильтры ──────────────────────────────────────────────────────────
function applyFilters() {
  const activeYears = new Set([...document.querySelectorAll('.yr:checked')].map(c => +c.value));
  const activeDths  = new Set([...document.querySelectorAll('.dth:checked')].map(c => +c.value));
  markers.forEach(m => {
    const dk = m.options.deaths;
    if (activeYears.has(m.options.year) && activeDths.has(dk)) m.addTo(map);
    else map.removeLayer(m);
  });
  updateCounter();
}
document.querySelectorAll('.yr, .dth').forEach(cb => cb.addEventListener('change', applyFilters));
</script>
